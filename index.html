<!DOCTYPE html>
<html>
<head>
    <title>Zombie Multiplayer</title>
    <style>
        body {
            margin: 0;
            background: #111;
            overflow: hidden;
            color: white;
            font-family: Arial;
        }
        canvas {
            background: #222;
            display: none;
        }
        #authBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #222;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
        }
        input {
            margin: 5px;
            padding: 8px;
        }
        button {
            margin: 5px;
            padding: 8px 15px;
            cursor: pointer;
        }
        #error {
            color: red;
        }
    </style>
</head>
<body>

<div id="authBox">
    <h2>Login / Signup</h2>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="authenticate('login')">Login</button>
    <button onclick="authenticate('signup')">Signup</button>
    <div id="error"></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let players = [];
let zombie = { x: 100, y: 100 };
let myId = null;
let authenticated = false;

/* -------- ROOM FROM URL -------- */

const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "default";

const socket = new WebSocket(`ws://localhost:8765/?room=${room}`);

/* -------------------------------- */

socket.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if(data.type === "error"){
        document.getElementById("error").innerText = data.message;
    }

    if(data.type === "init"){
        myId = data.id;
        authenticated = true;
        document.getElementById("authBox").style.display = "none";
        canvas.style.display = "block";
    }

    if(data.type === "state"){
        players = data.players;
        zombie = data.zombie;
    }
};

function authenticate(type){
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    socket.send(JSON.stringify({
        type: type,
        username: username,
        password: password
    }));
}

window.addEventListener("keydown", (e) => {
    if(!authenticated) return;

    const key = e.key.toUpperCase();
    if(["W","A","S","D"].includes(key)){
        socket.send(key);
    }
});

window.addEventListener("keyup", (e) => {
    if(!authenticated) return;

    const key = e.key.toUpperCase();
    if(["W","A","S","D"].includes(key)){
        socket.send("STOP_"+key);
    }
});

function draw() {
    if(!authenticated) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    players.forEach(p => {
        ctx.fillStyle = p.id === myId ? "lime" : "blue";
        ctx.fillRect(p.x - 15, p.y - 15, 30, 30);
    });

    ctx.fillStyle = "red";
    ctx.fillRect(zombie.x - 15, zombie.y - 15, 30, 30);

    const me = players.find(p => p.id === myId);

    if(me){
        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.fillText("Room: " + room, 20, 30);
        ctx.fillText("Health: " + me.health, 20, 60);

        if(me.health <= 0){
            ctx.fillStyle = "red";
            ctx.font = "60px Arial";
            ctx.fillText("GAME OVER", canvas.width/2 - 200, canvas.height/2);
        }
    }
}

function gameLoop() {
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
